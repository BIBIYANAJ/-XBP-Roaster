<!DOCTYPE html>
<html>
<head>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
<main>
    <a href="{{ url_for('admin_dashboard') }}" class="back-link">← Back to Dashboard</a>
    <h2>All Employees</h2>
    
    <div class="search-card">
        <form method="GET" action="{{ url_for('all_employees') }}" class="search-row">
            <div style="flex: 1;">
                <label>Search (Name, Email, or S.No)</label>
                <!-- Added "oninput" for real-time filtering if needed, or just standard search -->
                <input type="text" name="search" id="search-input" value="{{ search }}" placeholder="Search by name, email, or number...">
            </div>
            <button type="submit" class="button" style="width: auto;">Search</button>
        </form>
    </div>

    <table class="roster-table">
        <thead>
            <tr>
                <th>S.No</th> <!-- New Serial Column -->
                <th>Name</th>
                <th>Email</th>
                <th>Phone</th>
                <th>Teams</th>
            </tr>
        </thead>
        <tbody id="emp-table-body">
            {% for emp in employees %}
            <tr class="emp-row" data-index="{{ loop.index }}">
                <td>{{ loop.index }}</td> <!-- Serial Number generated by loop -->
                <td>{{ emp.name }}</td>
                <td>{{ emp.email }}</td>
                <td>{{ emp.phone or 'N/A' }}</td>
                <td>
                    {% for team in emp.teams %}
                        <span class="team-chip">{{ team.name }}</span>
                    {% endfor %}
                </td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</main>

<script>
    document.getElementById('search-input').addEventListener('keyup', function() {
        let val = this.value.toLowerCase();
        let visibleCount = 1;
        document.querySelectorAll('.emp-row').forEach(row => {
            let text = row.innerText.toLowerCase();
            if (text.includes(val)) {
                row.style.display = '';
                // Update the first column (S.No) of the visible row
                row.querySelector('td:first-child').innerText = visibleCount++;
            } else {
                row.style.display = 'none';
            }
        });
    });
</script>
</body>
</html>
